name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.12.0
  NODE_VERSION: 20
  PYTHON_VERSION: "3.11"

jobs:
  api:
    name: API · lint + type + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: enterprisegpt_test
          POSTGRES_USER: egpt
          POSTGRES_PASSWORD: egpt_dev_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U egpt -d enterprisegpt_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key-do-not-use-in-prod
      DATABASE_URL: postgresql+asyncpg://egpt:egpt_dev_password@localhost:5432/enterprisegpt_test
      REDIS_URL: redis://localhost:6379/0
      QDRANT_URL: http://localhost:6333
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install poetry==1.8.3

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            apps/api/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('apps/api/pyproject.toml') }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Type-check (mypy)
        run: poetry run mypy . || true

      - name: Run pytest
        run: poetry run pytest --cov --cov-report=term-missing

  web:
    name: Web · lint + type + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (workspace root)
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile=false

      - name: Lint (next lint)
        run: pnpm lint

      - name: Type-check (tsc)
        run: pnpm type-check

      - name: Unit tests (vitest)
        run: pnpm test
